name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ──────────────────────────────────────────────────────
  # 测试（不阻塞构建）
  # ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r coordinator/requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=long

  # ──────────────────────────────────────────────────────
  # Worker 构建 (CUDA 12, PyInstaller)
  # ──────────────────────────────────────────────────────
  build-worker-cuda12:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ssubb-worker-win64-cuda12
          - os: ubuntu-latest
            artifact: ssubb-worker-linux-x64-cuda12
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (CPU torch for smaller bundle)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r worker/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python scripts/build_worker.py --output-dir dist --cuda cuda12

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.zip

  # ──────────────────────────────────────────────────────
  # Worker 构建 (CUDA 11, PyInstaller)
  # ──────────────────────────────────────────────────────
  build-worker-cuda11:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ssubb-worker-win64-cuda11
          - os: ubuntu-latest
            artifact: ssubb-worker-linux-x64-cuda11
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install CUDA 11 dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu118
          pip install -r worker/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python scripts/build_worker.py --output-dir dist --cuda cuda11

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.zip

  # ──────────────────────────────────────────────────────
  # Launcher 构建 (PyInstaller + PySide6)
  # ──────────────────────────────────────────────────────
  build-launcher:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ssubb-launcher-win64
          - os: ubuntu-latest
            artifact: ssubb-launcher-linux-x64
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r coordinator/requirements.txt
          pip install pyinstaller PySide6

      - name: Build Launcher
        run: python scripts/build_launcher.py --output-dir dist

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.zip

  # ──────────────────────────────────────────────────────
  # GitHub Release（收集所有成功构建的产物）
  # ──────────────────────────────────────────────────────
  release:
    needs: [build-worker-cuda12, build-worker-cuda11, build-launcher]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: find artifacts -type f -name "*.zip" | sort || echo "No artifacts found"

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.zip" -exec sha256sum {} \; > checksums.sha256 || true
          cat checksums.sha256 || echo "No checksums generated"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/checksums.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
