name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ──────────────────────────────────────────────────────
  # 测试（不阻塞构建）
  # ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r coordinator/requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=long

  # ──────────────────────────────────────────────────────
  # Worker 构建 (faster-whisper-xxl 内置 CUDA，无需变体)
  # ──────────────────────────────────────────────────────
  build-worker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ssubb-worker-win64
            ext: .exe
          - os: ubuntu-latest
            artifact: ssubb-worker-linux-x64
            ext: ""
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r worker/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python scripts/build_worker.py --onefile --output-dir dist

      - name: Upload exe artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/ssubb-worker${{ matrix.ext }}

  # ──────────────────────────────────────────────────────
  # Launcher 构建 (PySide6)
  # ──────────────────────────────────────────────────────
  build-launcher:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ssubb-launcher-win64
            ext: .exe
          - os: ubuntu-latest
            artifact: ssubb-launcher-linux-x64
            ext: ""
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r coordinator/requirements.txt
          pip install pyinstaller PySide6

      - name: Build Launcher
        run: python scripts/build_launcher.py --onefile --output-dir dist

      - name: Upload exe artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/ssubb-launcher${{ matrix.ext }}

  # ──────────────────────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────────────────────
  release:
    needs: [build-worker, build-launcher]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Flatten artifacts for release
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "ssubb-*" \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.sha256 || true
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
