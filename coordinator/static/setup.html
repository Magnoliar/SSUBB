<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSUBB - 初始化配置引导</title>
    <meta name="description" content="SSUBB Coordinator 首次启动设置">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-void: #06070a;
            --bg-surface: #0c0e13;
            --bg-panel: rgba(14, 17, 24, 0.85);
            --bg-elevated: rgba(22, 26, 36, 0.9);
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-dim: rgba(255, 255, 255, 0.08);
            --text-primary: #e8eaed;
            --text-secondary: #8b919a;
            --text-muted: #4a4f57;
            --accent-amber: #f5a623;
            --accent-amber-dim: rgba(245, 166, 35, 0.15);
            --accent-amber-glow: rgba(245, 166, 35, 0.4);
            --accent-cyan: #3ecfcf;
            --accent-red: #e54b4b;
            --accent-green: #4ade80;
            --accent-blue: #6b8afd;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Film grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.5;
        }

        /* Atmospheric vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, transparent 40%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
            z-index: 0;
        }

        #app { position: relative; z-index: 1; }
        [v-cloak] { display: none; }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.02em;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .glow-text {
            text-shadow: 0 0 20px var(--accent-amber-glow), 0 0 40px rgba(245,166,35,0.15);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--accent-amber) 0%, #e8893a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            background: var(--bg-void);
            border: 1px solid var(--border-dim);
            border-radius: 3px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-amber);
            box-shadow: 0 0 0 2px var(--accent-amber-dim);
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-amber) 0%, #e8893a 100%);
            color: #0a0b0d;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-amber-glow);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Step indicator — diamond */
        .step-icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            transform: rotate(45deg);
            background: rgba(100, 116, 139, 0.1);
            border: 1.5px solid var(--border-dim);
            color: var(--text-muted);
            font-size: 13px;
            transition: all 0.3s;
        }
        .step-icon i { transform: rotate(-45deg); }
        .step-icon.active {
            background: var(--accent-amber-dim);
            border-color: rgba(245, 166, 35, 0.5);
            color: var(--accent-amber);
            box-shadow: 0 0 15px rgba(245, 166, 35, 0.2);
        }
        .step-icon.done {
            background: rgba(74, 222, 128, 0.12);
            border-color: rgba(74, 222, 128, 0.4);
            color: var(--accent-green);
        }

        /* Stagger entrance */
        .stagger-in > * {
            animation: fade-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
        .stagger-in > *:nth-child(1) { animation-delay: 0.05s; }
        .stagger-in > *:nth-child(2) { animation-delay: 0.12s; }
        .stagger-in > *:nth-child(3) { animation-delay: 0.19s; }
        .stagger-in > *:nth-child(4) { animation-delay: 0.26s; }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-dim), transparent);
            margin: 2rem 0;
        }

        /* Toggle switch */
        .toggle-track {
            width: 40px; height: 22px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-dim);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-track.on {
            background: var(--accent-amber-dim);
            border-color: rgba(245, 166, 35, 0.4);
        }
        .toggle-knob {
            width: 16px; height: 16px;
            background: var(--text-muted);
            border-radius: 50%;
            position: absolute;
            top: 2px; left: 2px;
            transition: all 0.2s;
        }
        .toggle-track.on .toggle-knob {
            transform: translateX(18px);
            background: var(--accent-amber);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    </style>
</head>
<body class="p-4">

<div id="app" class="w-full max-w-2xl" v-cloak>

    <!-- Header -->
    <div class="text-center mb-8 stagger-in">
        <div class="inline-block p-3 border border-[var(--border-dim)] rounded-sm mb-4">
            <i class="fa-solid fa-closed-captioning text-3xl gradient-text glow-text"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-wide">
            <span class="gradient-text">SSUBB</span>
            <span class="mono font-light text-[var(--text-muted)] text-sm ml-2">SETUP</span>
        </h1>
        <p class="text-xs text-[var(--text-muted)] tracking-wider uppercase mt-1">Distributed Subtitle Intelligence</p>
        <p class="text-sm text-[var(--text-secondary)] mt-3">首次启动，请完成基础配置以继续</p>
    </div>

    <!-- Setup Form -->
    <div class="glass-panel p-8">
        <form @submit.prevent="submitSetup" class="stagger-in">

            <!-- Step 1: Worker -->
            <div class="mb-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="step-icon" :class="form.worker_url ? 'done' : 'active'">
                        <i class="fa-solid fa-server"></i>
                    </div>
                    <div>
                        <h2 class="text-base font-semibold">核心连接</h2>
                        <p class="text-xs text-[var(--text-muted)] mono">WORKER NODE</p>
                    </div>
                </div>
                <div class="ml-14">
                    <label class="block text-xs font-medium text-[var(--text-secondary)] mb-1.5">GPU Worker 地址 <span class="text-[var(--accent-red)]">*</span></label>
                    <input type="text" v-model="form.worker_url" class="form-input mono text-sm" placeholder="http://192.168.1.50:8788" required>
                    <p class="text-[10px] text-[var(--text-muted)] mt-1.5">运行 Whisper + LLM 的 GPU 节点，通常在带显卡的机器上</p>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Step 2: Subtitle -->
            <div class="mb-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="step-icon" :class="form.worker_url ? 'active' : ''">
                        <i class="fa-solid fa-language"></i>
                    </div>
                    <div>
                        <h2 class="text-base font-semibold">字幕偏好</h2>
                        <p class="text-xs text-[var(--text-muted)] mono">SUBTITLE PREFERENCES</p>
                    </div>
                </div>
                <div class="ml-14 grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-[var(--text-secondary)] mb-1.5">输出模式</label>
                        <select v-model="form.output_mode" class="form-input text-sm">
                            <option value="bilingual">中英双语 (推荐)</option>
                            <option value="single">仅中文翻译</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-[var(--text-secondary)] mb-1.5">输出格式</label>
                        <select v-model="form.output_format" class="form-input text-sm">
                            <option value="ass">ASS (高级样式/描边)</option>
                            <option value="srt">SRT (基础格式)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Step 3: Advanced -->
            <div class="mb-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="step-icon" :class="form.worker_url ? 'active' : ''">
                        <i class="fa-solid fa-sliders"></i>
                    </div>
                    <div>
                        <h2 class="text-base font-semibold">进阶选项</h2>
                        <p class="text-xs text-[var(--text-muted)] mono">OPTIONAL · 可稍后在设置中配置</p>
                    </div>
                </div>

                <div class="ml-14 space-y-4">
                    <!-- Emby -->
                    <div class="bg-[var(--bg-elevated)] rounded-sm p-4 border border-[var(--border-dim)]">
                        <h3 class="text-sm font-medium text-[var(--text-primary)] mb-3">
                            <i class="fa-solid fa-tv mr-2 text-[var(--accent-green)]"></i>Emby / Jellyfin 联动
                        </h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-[var(--text-secondary)] mb-1">服务器地址</label>
                                <input type="text" v-model="form.emby_server" class="form-input text-sm mono" placeholder="http://192.168.1.100:8096">
                            </div>
                            <div>
                                <label class="block text-xs text-[var(--text-secondary)] mb-1">API Key</label>
                                <input type="text" v-model="form.emby_api_key" class="form-input text-sm mono" placeholder="Emby 控制台生成">
                            </div>
                        </div>
                    </div>

                    <!-- Automation -->
                    <div class="bg-[var(--bg-elevated)] rounded-sm p-4 border border-[var(--border-dim)]">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-sm font-medium text-[var(--text-primary)]">
                                <i class="fa-solid fa-robot mr-2 text-[var(--accent-blue)]"></i>自动化定时扫描
                            </h3>
                            <div class="toggle-track" :class="{'on': form.enable_automation}" @click="form.enable_automation = !form.enable_automation">
                                <div class="toggle-knob"></div>
                            </div>
                        </div>
                        <div v-if="form.enable_automation" class="mt-3">
                            <label class="block text-xs text-[var(--text-secondary)] mb-1">媒体目录 (多目录用回车分隔)</label>
                            <textarea v-model="scanPathsRaw" class="form-input text-sm mono h-20" placeholder="/volume1/video/movies&#10;/volume1/video/tv"></textarea>
                            <p class="text-[10px] text-[var(--text-muted)] mt-1">Docker 部署时填写容器内路径</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error -->
            <div v-if="errorMsg" class="mb-6 p-4 bg-[var(--accent-red)]/10 border border-[var(--accent-red)]/20 rounded-sm text-[var(--accent-red)] text-sm flex items-start">
                <i class="fa-solid fa-triangle-exclamation mt-0.5 mr-2"></i>
                <span>{{ errorMsg }}</span>
            </div>

            <!-- Submit -->
            <div class="mt-8 flex justify-end">
                <button type="submit" class="btn-primary px-8 py-3 rounded-sm font-medium flex items-center" :disabled="submitting || !form.worker_url">
                    <i v-if="submitting" class="fa-solid fa-spinner fa-spin mr-2"></i>
                    <i v-else class="fa-solid fa-rocket mr-2"></i>
                    保存并初始化
                </button>
            </div>
        </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6">
        <p class="mono text-[10px] text-[var(--text-muted)] tracking-wider">CONFIGURATION WILL BE SAVED TO config.yaml</p>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const form = ref({
                worker_url: '',
                output_mode: 'bilingual',
                output_format: 'ass',
                emby_server: '',
                emby_api_key: '',
                enable_automation: false,
                scan_paths: []
            });

            const scanPathsRaw = ref('');
            const submitting = ref(false);
            const errorMsg = ref('');

            const submitSetup = async () => {
                if (!form.value.worker_url) return;

                submitting.value = true;
                errorMsg.value = '';

                if (form.value.enable_automation && scanPathsRaw.value) {
                    form.value.scan_paths = scanPathsRaw.value.split('\n')
                        .map(p => p.trim())
                        .filter(p => p.length > 0);
                } else {
                    form.value.scan_paths = [];
                }

                try {
                    const res = await fetch('/api/setup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form.value)
                    });

                    const data = await res.json();

                    if (res.ok && data.code === 0) {
                        document.body.innerHTML = `
                            <div style="position:relative;z-index:1;text-align:center;font-family:Outfit,sans-serif;color:#e8eaed">
                                <div style="color:#4ade80;font-size:48px;margin-bottom:16px"><i class="fa-regular fa-circle-check"></i></div>
                                <h2 style="font-size:20px;font-weight:600;margin-bottom:8px">初始化成功</h2>
                                <p style="color:#8b919a;font-size:14px;margin-bottom:24px">调度引擎已热启动，正在进入控制台...</p>
                                <div style="width:48px;height:2px;background:rgba(255,255,255,0.08);margin:0 auto;border-radius:1px;overflow:hidden">
                                    <div style="height:100%;background:#f5a623;width:100%;animation:pulse 1s infinite"></div>
                                </div>
                            </div>
                        `;
                        setTimeout(() => { window.location.reload(); }, 2000);
                    } else {
                        errorMsg.value = data.detail || data.msg || '保存配置失败，请检查填写的内容。';
                    }
                } catch (e) {
                    errorMsg.value = '网络错误: ' + e.message;
                } finally {
                    submitting.value = false;
                }
            };

            return { form, scanPathsRaw, submitting, errorMsg, submitSetup };
        }
    }).mount('#app');
</script>
</body>
</html>
